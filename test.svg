      <svg id="avatar-canvas" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-label="Avatar Eduardo.AI">
        <defs>
          <radialGradient id="av-body" cx="42%" cy="38%" r="60%">
            <stop offset="0%"   stop-color="#2d1f4e"/>
            <stop offset="100%" stop-color="#0f0a1e"/>
          </radialGradient>
          <radialGradient id="av-eye" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#c4b5fd"/>
            <stop offset="60%"  stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-core" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-rim" cx="15%" cy="45%" r="50%">
            <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-rim2" cx="85%" cy="55%" r="45%">
            <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Neck -->
        <rect x="145" y="205" width="30" height="28" rx="8" fill="url(#av-body)"/>

        <!-- Torso -->
        <ellipse cx="160" cy="265" rx="52" ry="42" fill="url(#av-body)"/>
        <ellipse cx="108" cy="245" rx="22" ry="18" fill="url(#av-body)"/>
        <ellipse cx="212" cy="245" rx="22" ry="18" fill="url(#av-body)"/>
        <rect x="87"  y="254" width="20" height="44" rx="10" fill="url(#av-body)"/>
        <rect x="213" y="254" width="20" height="44" rx="10" fill="url(#av-body)"/>
        <ellipse cx="160" cy="260" rx="52" ry="42" fill="url(#av-rim)"/>
        <ellipse cx="160" cy="260" rx="52" ry="42" fill="url(#av-rim2)"/>
        <ellipse cx="160" cy="265" rx="52" ry="42" fill="none" stroke="#a78bfa" stroke-width="0.4" opacity="0.12"/>

        <!-- Chest grill lines -->
        <line x1="148" y1="258" x2="172" y2="258" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>
        <line x1="145" y1="265" x2="175" y2="265" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>
        <line x1="148" y1="272" x2="172" y2="272" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>

        <!-- Core glow -->
        <circle cx="160" cy="248" r="7" fill="url(#av-core)" opacity="0.9">
          <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="160" cy="248" r="3.5" fill="#c4b5fd">
          <animate attributeName="r" values="3;4;3" dur="2.4s" repeatCount="indefinite"/>
        </circle>

        <!-- Head -->
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-body)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-rim)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-rim2)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.10"/>

        <!-- Eye left -->
        <circle cx="136" cy="155" r="13" fill="#1a0e2e"/>
        <circle cx="136" cy="155" r="10" fill="url(#av-eye)">
          <animate attributeName="r" values="9;11;9" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="136" cy="155" r="4"  fill="#e9d5ff">
          <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="136" cy="155" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
        </circle>

        <!-- Eye right -->
        <circle cx="184" cy="155" r="13" fill="#1a0e2e"/>
        <circle cx="184" cy="155" r="10" fill="url(#av-eye)">
          <animate attributeName="r" values="9;11;9" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="184" cy="155" r="4"  fill="#e9d5ff">
          <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="184" cy="155" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>

        <!-- Mouth grill -->
        <g id="av-mouth">
          <line x1="144" y1="183" x2="176" y2="183" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="147" y1="188" x2="173" y2="188" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="144" y1="193" x2="176" y2="193" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
        </g>

        <!-- Idle float -->
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite"
          additive="sum"/>
      </svg>