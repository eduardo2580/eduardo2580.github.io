<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia Sagrada — NAA</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══ HEADER ═══════════════════════════════════════════ -->
<header>
  <div class="d-flex align-items-center gap-3">
    <button class="btn-menu" id="toggleSidebar" title="Menu de livros">
      <i class="bi bi-list"></i>
    </button>

    <div class="brand">
      ✦ Bíblia Sagrada
      <small>NOVA ALMEIDA ATUALIZADA</small>
    </div>

    <div class="search-wrap ms-auto d-none d-md-block">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Buscar versículo..." autocomplete="off" />
    </div>

    <div class="font-controls ms-2">
      <button id="fontDown" title="Diminuir fonte"><i class="bi bi-type"></i>−</button>
      <button id="fontUp"   title="Aumentar fonte"><i class="bi bi-type-bold"></i>+</button>
    </div>
  </div>
</header>

<!-- ═══ LAYOUT ══════════════════════════════════════════ -->
<div class="layout">

  <!-- ── SIDEBAR ── -->
  <nav id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">✦ Antigo Testamento</div>
      <div id="otBooks"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">✦ Novo Testamento</div>
      <div id="ntBooks"></div>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main id="main">
    <div id="loader">
      <div class="spinner-border" role="status" style="width:2.5rem;height:2.5rem;border-width:3px;"></div>
      Carregando a Palavra…
    </div>
    <div id="error-msg" class="d-none"></div>
    <div id="content" class="d-none"></div>
  </main>
</div>

<!-- scroll-to-top -->
<button id="scrollTop" title="Voltar ao topo"><i class="bi bi-chevron-up"></i></button>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ════════════════════════════════════════════════════════
   DATA — Canon bíblico completo (abreviações para API)
═════════════════════════════════════════════════════════ */
const BOOKS = {
  ot: [
    { id:'GEN', name:'Gênesis',        chapters:50 },
    { id:'EXO', name:'Êxodo',          chapters:40 },
    { id:'LEV', name:'Levítico',       chapters:27 },
    { id:'NUM', name:'Números',        chapters:36 },
    { id:'DEU', name:'Deuteronômio',   chapters:34 },
    { id:'JOS', name:'Josué',          chapters:24 },
    { id:'JDG', name:'Juízes',         chapters:21 },
    { id:'RUT', name:'Rute',           chapters:4  },
    { id:'1SA', name:'1 Samuel',       chapters:31 },
    { id:'2SA', name:'2 Samuel',       chapters:24 },
    { id:'1KI', name:'1 Reis',         chapters:22 },
    { id:'2KI', name:'2 Reis',         chapters:25 },
    { id:'1CH', name:'1 Crônicas',     chapters:29 },
    { id:'2CH', name:'2 Crônicas',     chapters:36 },
    { id:'EZR', name:'Esdras',         chapters:10 },
    { id:'NEH', name:'Neemias',        chapters:13 },
    { id:'EST', name:'Ester',          chapters:10 },
    { id:'JOB', name:'Jó',             chapters:42 },
    { id:'PSA', name:'Salmos',         chapters:150},
    { id:'PRO', name:'Provérbios',     chapters:31 },
    { id:'ECC', name:'Eclesiastes',    chapters:12 },
    { id:'SNG', name:'Cânticos',       chapters:8  },
    { id:'ISA', name:'Isaías',         chapters:66 },
    { id:'JER', name:'Jeremias',       chapters:52 },
    { id:'LAM', name:'Lamentações',    chapters:5  },
    { id:'EZK', name:'Ezequiel',       chapters:48 },
    { id:'DAN', name:'Daniel',         chapters:12 },
    { id:'HOS', name:'Oséias',         chapters:14 },
    { id:'JOL', name:'Joel',           chapters:3  },
    { id:'AMO', name:'Amós',           chapters:9  },
    { id:'OBA', name:'Obadias',        chapters:1  },
    { id:'JON', name:'Jonas',          chapters:4  },
    { id:'MIC', name:'Miquéias',       chapters:7  },
    { id:'NAM', name:'Naum',           chapters:3  },
    { id:'HAB', name:'Habacuque',      chapters:3  },
    { id:'ZEP', name:'Sofonias',       chapters:3  },
    { id:'HAG', name:'Ageu',           chapters:2  },
    { id:'ZEC', name:'Zacarias',       chapters:14 },
    { id:'MAL', name:'Malaquias',      chapters:4  },
  ],
  nt: [
    { id:'MAT', name:'Mateus',         chapters:28 },
    { id:'MRK', name:'Marcos',         chapters:16 },
    { id:'LUK', name:'Lucas',          chapters:24 },
    { id:'JHN', name:'João',           chapters:21 },
    { id:'ACT', name:'Atos',           chapters:28 },
    { id:'ROM', name:'Romanos',        chapters:16 },
    { id:'1CO', name:'1 Coríntios',    chapters:16 },
    { id:'2CO', name:'2 Coríntios',    chapters:13 },
    { id:'GAL', name:'Gálatas',        chapters:6  },
    { id:'EPH', name:'Efésios',        chapters:6  },
    { id:'PHP', name:'Filipenses',     chapters:4  },
    { id:'COL', name:'Colossenses',    chapters:4  },
    { id:'1TH', name:'1 Tessalonicenses',chapters:5},
    { id:'2TH', name:'2 Tessalonicenses',chapters:3},
    { id:'1TI', name:'1 Timóteo',      chapters:6  },
    { id:'2TI', name:'2 Timóteo',      chapters:4  },
    { id:'TIT', name:'Tito',           chapters:3  },
    { id:'PHM', name:'Filemom',        chapters:1  },
    { id:'HEB', name:'Hebreus',        chapters:13 },
    { id:'JAS', name:'Tiago',          chapters:5  },
    { id:'1PE', name:'1 Pedro',        chapters:5  },
    { id:'2PE', name:'2 Pedro',        chapters:3  },
    { id:'1JN', name:'1 João',         chapters:5  },
    { id:'2JN', name:'2 João',         chapters:1  },
    { id:'3JN', name:'3 João',         chapters:1  },
    { id:'JUD', name:'Judas',          chapters:1  },
    { id:'REV', name:'Apocalipse',     chapters:22 },
  ]
};

const ALL_BOOKS = [...BOOKS.ot, ...BOOKS.nt];

/* ── STATE ── */
let state = {
  bookId:   'JHN',
  chapter:  1,
  fontSize: 1.1,
  verses:   [],
};

/* ══════════════ BUILD SIDEBAR ══════════════════════════ */
function buildSidebar() {
  ['ot','nt'].forEach(section => {
    const container = document.getElementById(section+'Books');
    BOOKS[section].forEach(book => {
      const btn = document.createElement('button');
      btn.className = 'book-btn';
      btn.textContent = book.name;
      btn.dataset.id = book.id;
      btn.addEventListener('click', () => loadBook(book.id, 1));
      container.appendChild(btn);
    });
  });
}

function updateActiveBook() {
  document.querySelectorAll('.book-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === state.bookId);
  });
  // scroll active book into view in sidebar
  const active = document.querySelector('.book-btn.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

/* ══════════════ CHAPTER SELECTOR ═══════════════════════ */
function buildChapterSelector(bookId, currentChap) {
  const book = ALL_BOOKS.find(b => b.id === bookId);
  const row = document.createElement('div');
  row.className = 'chapter-row';
  for (let c = 1; c <= book.chapters; c++) {
    const btn = document.createElement('button');
    btn.className = 'chap-btn' + (c === currentChap ? ' active' : '');
    btn.textContent = c;
    btn.addEventListener('click', () => loadChapter(bookId, c));
    row.appendChild(btn);
  }
  return row;
}

/* ══════════════ API FETCH ════════════════════════════════
   Using api.bible (BSB) as a free, CORS-friendly source.
   Fallback to static sample if network unavailable.
══════════════════════════════════════════════════════════ */
const API_BASE = 'https://bible-api.com/';

async function fetchChapter(bookId, chapter) {
  const book = ALL_BOOKS.find(b => b.id === bookId);
  // bible-api uses book name (English) — map common ones
  const nameMap = {
    GEN:'genesis',EXO:'exodus',LEV:'leviticus',NUM:'numbers',DEU:'deuteronomy',
    JOS:'joshua',JDG:'judges',RUT:'ruth','1SA':'1+samuel','2SA':'2+samuel',
    '1KI':'1+kings','2KI':'2+kings','1CH':'1+chronicles','2CH':'2+chronicles',
    EZR:'ezra',NEH:'nehemiah',EST:'esther',JOB:'job',PSA:'psalms',PRO:'proverbs',
    ECC:'ecclesiastes',SNG:'song+of+solomon',ISA:'isaiah',JER:'jeremiah',
    LAM:'lamentations',EZK:'ezekiel',DAN:'daniel',HOS:'hosea',JOL:'joel',
    AMO:'amos',OBA:'obadiah',JON:'jonah',MIC:'micah',NAM:'nahum',HAB:'habakkuk',
    ZEP:'zephaniah',HAG:'haggai',ZEC:'zechariah',MAL:'malachi',
    MAT:'matthew',MRK:'mark',LUK:'luke',JHN:'john',ACT:'acts',ROM:'romans',
    '1CO':'1+corinthians','2CO':'2+corinthians',GAL:'galatians',EPH:'ephesians',
    PHP:'philippians',COL:'colossians','1TH':'1+thessalonians','2TH':'2+thessalonians',
    '1TI':'1+timothy','2TI':'2+timothy',TIT:'titus',PHM:'philemon',HEB:'hebrews',
    JAS:'james','1PE':'1+peter','2PE':'2+peter','1JN':'1+john','2JN':'2+john',
    '3JN':'3+john',JUD:'jude',REV:'revelation'
  };

  const slug = nameMap[bookId] || book.name.toLowerCase().replace(' ','+');
  const url  = `${API_BASE}${slug}+${chapter}?translation=almeida`;

  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.verses; // [{book_name, chapter, verse, text}]
}

/* ══════════════ RENDER ══════════════════════════════════ */
function showLoader()  { document.getElementById('loader').classList.remove('d-none'); document.getElementById('content').classList.add('d-none'); document.getElementById('error-msg').classList.add('d-none'); }
function showContent() { document.getElementById('loader').classList.add('d-none'); document.getElementById('content').classList.remove('d-none'); }
function showError(msg){ document.getElementById('loader').classList.add('d-none'); const el=document.getElementById('error-msg'); el.classList.remove('d-none'); el.innerHTML=`<i class="bi bi-exclamation-circle" style="font-size:2rem;display:block;margin-bottom:.8rem"></i>${msg}`; }

function renderVerses(verses, bookName, chapter) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.className = 'fade-in';

  // heading
  const h = document.createElement('div');
  h.innerHTML = `
    <h1 class="bible-heading">${bookName}</h1>
    <div class="bible-subheading">Capítulo ${chapter}</div>
    <div class="ornament">✦ ✦ ✦</div>
  `;
  content.appendChild(h);

  // chapter selector
  content.appendChild(buildChapterSelector(state.bookId, chapter));

  // verses
  const verseContainer = document.createElement('div');
  verses.forEach(v => {
    const row = document.createElement('div');
    row.className = 'verse';
    row.dataset.verse = v.verse;
    row.innerHTML = `<span class="verse-num">${v.verse}</span><span class="verse-text">${v.text.trim()}</span>`;
    row.addEventListener('click', () => row.classList.toggle('highlight'));
    verseContainer.appendChild(row);
  });
  content.appendChild(verseContainer);

  // prev/next navigation
  const book = ALL_BOOKS.find(b => b.id === state.bookId);
  const nav  = document.createElement('div');
  nav.className = 'chap-nav';
  nav.innerHTML = `
    <button class="btn-nav" id="prevChap" ${chapter<=1?'disabled':''}>
      <i class="bi bi-chevron-left"></i> Capítulo ${chapter-1}
    </button>
    <button class="btn-nav" id="nextChap" ${chapter>=book.chapters?'disabled':''}>
      Capítulo ${chapter+1} <i class="bi bi-chevron-right"></i>
    </button>
  `;
  content.appendChild(nav);

  document.getElementById('prevChap')?.addEventListener('click', () => loadChapter(state.bookId, state.chapter - 1));
  document.getElementById('nextChap')?.addEventListener('click', () => loadChapter(state.bookId, state.chapter + 1));

  // close sidebar on mobile after selection
  if (window.innerWidth < 768) closeSidebar();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ══════════════ LOAD ═════════════════════════════════════ */
async function loadChapter(bookId, chapter) {
  state.bookId = bookId;
  state.chapter = chapter;
  updateActiveBook();
  showLoader();

  try {
    const verses = await fetchChapter(bookId, chapter);
    state.verses = verses;
    const book   = ALL_BOOKS.find(b => b.id === bookId);
    renderVerses(verses, book.name, chapter);
    showContent();
  } catch(e) {
    showError(`Não foi possível carregar o capítulo.<br><small style="color:var(--ink-soft)">${e.message}</small><br><br><button onclick="loadChapter('${bookId}',${chapter})" class="btn-nav mt-2">⟳ Tentar novamente</button>`);
  }
}

function loadBook(bookId, chapter) {
  loadChapter(bookId, chapter || 1);
}

/* ══════════════ SIDEBAR TOGGLE ══════════════════════════ */
function closeSidebar() { document.getElementById('sidebar').classList.add('collapsed'); }
function openSidebar()  { document.getElementById('sidebar').classList.remove('collapsed'); }

document.getElementById('toggleSidebar').addEventListener('click', () => {
  const s = document.getElementById('sidebar');
  s.classList.toggle('collapsed');
});

/* ══════════════ SEARCH ══════════════════════════════════ */
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim().toLowerCase();
  if (!q) return;

  // Search in current chapter
  document.querySelectorAll('.verse').forEach(el => {
    const text = el.querySelector('.verse-text')?.textContent.toLowerCase() || '';
    if (text.includes(q)) {
      el.classList.add('highlight');
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      el.classList.remove('highlight');
    }
  });
});

/* ══════════════ FONT SIZE ═══════════════════════════════ */
function applyFontSize() {
  document.querySelectorAll('.verse-text').forEach(el => el.style.fontSize = state.fontSize + 'rem');
}
document.getElementById('fontUp').addEventListener('click', () => {
  state.fontSize = Math.min(1.6, +(state.fontSize + .1).toFixed(1));
  applyFontSize();
});
document.getElementById('fontDown').addEventListener('click', () => {
  state.fontSize = Math.max(.8, +(state.fontSize - .1).toFixed(1));
  applyFontSize();
});

/* ══════════════ SCROLL TO TOP ═══════════════════════════ */
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
});
scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* ══════════════ INIT ════════════════════════════════════ */
buildSidebar();
loadChapter('JHN', 1);  // default: João 1
</script>
</body>
</html>
