<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia Sagrada</title>

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header>
    <div class="d-flex align-items-center gap-3">
      <button class="btn-menu" id="toggleSidebar" title="Menu de livros">
        <i class="bi bi-list"></i>
      </button>

      <div class="brand">
        ✦ Bíblia Sagrada
      </div>

      <div class="search-wrap ms-auto d-none d-md-block">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar versículo..." autocomplete="off" />
      </div>

      <div class="font-controls ms-2">
        <button id="fontDown" title="Diminuir fonte"><i class="bi bi-type"></i>−</button>
        <button id="fontUp" title="Aumentar fonte"><i class="bi bi-type-bold"></i>+</button>
      </div>

      <!-- TTS button — injected by JS only when API is supported -->
      <div id="tts-wrap" style="display:none; flex-shrink:0;">
        <button id="ttsBtn" class="btn-tts" title="Ouvir a Palavra">
          <i class="bi bi-volume-up-fill" id="ttsIcon"></i>
          <span id="ttsLabel">Ouvir</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══ LAYOUT ══════════════════════════════════════════ -->
  <div class="layout">

    <!-- ── SIDEBAR ── -->
    <nav id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">✦ Daily</div>
        <div id="dailyBooks"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">✦ Antigo Testamento</div>
        <div id="otBooks"></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">✦ Novo Testamento</div>
        <div id="ntBooks"></div>
      </div>
    </nav>

    <!-- ── BACKDROP (mobile overlay) ── -->
    <div id="backdrop"></div>

    <!-- ── MAIN ── -->
    <main id="main">
      <div id="loader">
        <div class="spinner-border" role="status" style="width:2.5rem;height:2.5rem;border-width:3px;"></div>
        Carregando a Palavra…
      </div>
      <div id="error-msg" class="d-none"></div>
      <div id="content" class="d-none"></div>
    </main>
  </div>

  <!-- scroll-to-top -->
  <button id="scrollTop" title="Voltar ao topo"><i class="bi bi-chevron-up"></i></button>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>

<script src="js/bible-data.js"></script>
<script src="js/script.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/daily.js"></script>
<script src="js/notifications.js"></script>
</body>

</html>
