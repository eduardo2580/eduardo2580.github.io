<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bíblia Sagrada</title>

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- Bootstrap 5 -->
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  
  <script src="js/splash.js"></script>

  <div class="app-container">

    <!-- Top Bar (Dinâmico via JS para mostrar greeting) -->
    <div id="top-bar-placeholder"></div>

    <!-- Main Content Area -->
    <main id="content-area">
        <div id="loader"></div>
        <div id="error-msg" class="d-none"></div>
        <div id="content" class="fade-in"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-view="home">
            <i class="ph ph-house"></i>
            <i class="ph-fill ph-house"></i>
            <span>Início</span>
        </button>
        <button class="nav-item" data-view="bible">
            <i class="ph ph-book-open"></i>
            <i class="ph-fill ph-book-open"></i>
            <span>Bíblia</span>
        </button>
        <button class="nav-item" data-view="plans">
            <i class="ph ph-calendar-blank"></i>
            <i class="ph-fill ph-calendar-blank"></i>
            <span>Planos</span>
        </button>
        <button class="nav-item" data-view="search">
            <i class="ph ph-magnifying-glass"></i>
            <i class="ph-fill ph-magnifying-glass"></i>
            <span>Busca</span>
        </button>
        <button class="nav-item" data-view="settings">
            <i class="ph ph-gear"></i>
            <i class="ph-fill ph-gear"></i>
            <span>Mais</span>
        </button>
    </nav>

  </div>

  <!-- Scroll-to-top button -->
  <button id="scrollTop" title="Voltar ao topo">
    <i class="bi bi-chevron-up"></i>
  </button>

  <!-- Modal para pedir o nome -->
  <div id="name-modal-overlay" class="modal-overlay d-none">
      <div class="name-modal">
          <h2>Bem-vindo!</h2>
          <p>Como gostaria de ser chamado?</p>
          <input type="text" id="user-name-input" placeholder="Seu nome" autofocus>
          <button id="save-name-btn">Começar</button>
      </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="js/bootstrap.min.js"></script>

  <!-- VLibras accessibility widget -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script src="js/bible-data.js"></script>
  <script src="js/daily.js"></script>
  <script src="js/teens.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
