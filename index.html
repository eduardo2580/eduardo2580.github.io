<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Eduardo - Tech Developer</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://img.shields.io; font-src 'self' data:; frame-ancestors 'none'">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Eduardo Rodrigues - Tech Developer Portfolio">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <canvas id="canvas3d"></canvas>
    
    <!-- Language Selector Block -->
    <section class="language-selector-block">
        <div class="language-content">
            <h2 id="selectLangTitle">Select Language</h2>
            <div class="lang-buttons">
                <a href="index.en.html" class="lang-btn lang-en">
                    <span class="flag">🇺🇸</span>
                    <span>English</span>
                </a>
                <a href="index.es.html" class="lang-btn lang-es">
                    <span class="flag">🇪🇸</span>
                    <span>Español</span>
                </a>
                <a href="index.pt.html" class="lang-btn lang-pt">
                    <span class="flag">🇧🇷</span>
                    <span>Português</span>
                </a>
            </div>
        </div>
    </section>

    <!-- Welcome Message Block (Auto-rotating languages) -->
    <section class="welcome-block">
        <div class="welcome-content">
            <h1 id="welcomeName">Eduardo Rodrigues</h1>
            <p id="welcomeTitle" class="title">Full Stack Developer</p>
            <p id="welcomeBio" class="bio">Tech enthusiast passionate about building innovative solutions with clean code and great UX.</p>
        </div>
    </section>

    <!-- Footer Block -->
    <footer class="footer-block">
        <div class="footer-content">
            <p>&copy; 2025 - 2026 Eduardo Souza Rodrigues</p>
            <p id="footerRights">All rights reserved</p>
            <a href="https://orcid.org/0009-0001-7877-2153" target="_blank" rel="noopener" id="orcidLink">ORCID Profile →</a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Auto-rotating language content
        (function() {
            var translations = {
                en: {
                    selectLang: 'Select Language',
                    name: 'Eduardo Rodrigues',
                    title: 'Full Stack Developer',
                    bio: 'Tech enthusiast passionate about building innovative solutions with clean code and great UX.',
                    rights: 'All rights reserved',
                    orcid: 'ORCID Profile →'
                },
                es: {
                    selectLang: 'Selecciona el idioma',
                    name: 'Eduardo Rodrigues',
                    title: 'Desarrollador Full Stack',
                    bio: 'Entusiasta de la tecnología apasionado por crear soluciones innovadoras con código limpio y excelente UX.',
                    rights: 'Todos los derechos reservados',
                    orcid: 'Perfil ORCID →'
                },
                pt: {
                    selectLang: 'Selecione o idioma',
                    name: 'Eduardo Rodrigues',
                    title: 'Desenvolvedor Full Stack',
                    bio: 'Entusiasta de tecnologia apaixonado por criar soluções inovadoras com código limpo e excelente UX.',
                    rights: 'Todos os direitos reservados',
                    orcid: 'Perfil ORCID →'
                }
            };

            var languages = ['en', 'es', 'pt'];
            var currentIndex = 0;

            function updateContent() {
                var lang = languages[currentIndex];
                var t = translations[lang];

                // Update text content with fade effect
                var elements = {
                    selectLangTitle: t.selectLang,
                    welcomeName: t.name,
                    welcomeTitle: t.title,
                    welcomeBio: t.bio,
                    footerRights: t.rights,
                    orcidLink: t.orcid
                };

                for (var id in elements) {
                    var el = document.getElementById(id);
                    if (el) {
                        el.style.opacity = '0';
                        setTimeout((function(element, text) {
                            return function() {
                                element.textContent = text;
                                element.style.opacity = '1';
                            };
                        })(el, elements[id]), 500);
                    }
                }

                currentIndex = (currentIndex + 1) % languages.length;
            }

            // Add transition style
            var style = document.createElement('style');
            style.textContent = '\
                #selectLangTitle, #welcomeName, #welcomeTitle, #welcomeBio, #footerRights, #orcidLink {\
                    transition: opacity 0.5s ease-in-out;\
                }\
            ';
            document.head.appendChild(style);

            // Rotate every 4 seconds
            setInterval(updateContent, 4000);
        })();
    </script>
</body>
</html>
