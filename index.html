<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eduardo.AI</title>

  <!-- ── PWA / Favicon ── -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Eduardo.AI"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"/>
  <link rel="shortcut icon" href="favicon.ico"/>

  <!-- ── SEO / Social ── -->
  <meta name="description" content="Eduardo Souza Rodrigues — Desenvolvedor Junior. Portfólio interativo com IA local."/>
  <meta name="author" content="Eduardo Souza Rodrigues"/>

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>

  <!-- compat.js MUST be first — patches DOM before anything else runs -->
  <script src="js/compat.js"></script>
</head>
<body>

  <!-- Ambient background SVG -->
  <svg id="bg-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="bg-glow1" cx="35%" cy="30%" r="55%">
        <stop offset="0%"   stop-color="#6B4FA0" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bg-glow2" cx="70%" cy="65%" r="50%">
        <stop offset="0%"   stop-color="#1a6b7a" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bg-glow3" cx="55%" cy="85%" r="40%">
        <stop offset="0%"   stop-color="#7a2060" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="100%" height="100%" fill="#0d0d1a"/>
    <rect width="100%" height="100%" fill="url(#bg-glow1)"/>
    <rect width="100%" height="100%" fill="url(#bg-glow2)"/>
    <rect width="100%" height="100%" fill="url(#bg-glow3)"/>
  </svg>

  <!-- Floating ambient orbs -->
  <div class="orbs" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div id="app">

    <!-- ══ Avatar area ══ -->
    <div id="avatar-area">

      <!-- Pure SVG avatar — zero JS, zero GPU, works everywhere -->
      <svg id="avatar-canvas" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-label="Avatar Eduardo.AI">
        <defs>
          <radialGradient id="av-body" cx="42%" cy="38%" r="60%">
            <stop offset="0%"   stop-color="#2d1f4e"/>
            <stop offset="100%" stop-color="#0f0a1e"/>
          </radialGradient>
          <radialGradient id="av-eye" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#c4b5fd"/>
            <stop offset="60%"  stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-core" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-rim" cx="15%" cy="45%" r="50%">
            <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="av-rim2" cx="85%" cy="55%" r="45%">
            <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Neck -->
        <rect x="145" y="205" width="30" height="28" rx="8" fill="url(#av-body)"/>

        <!-- Torso -->
        <ellipse cx="160" cy="265" rx="52" ry="42" fill="url(#av-body)"/>
        <ellipse cx="108" cy="245" rx="22" ry="18" fill="url(#av-body)"/>
        <ellipse cx="212" cy="245" rx="22" ry="18" fill="url(#av-body)"/>
        <rect x="87"  y="254" width="20" height="44" rx="10" fill="url(#av-body)"/>
        <rect x="213" y="254" width="20" height="44" rx="10" fill="url(#av-body)"/>
        <ellipse cx="160" cy="260" rx="52" ry="42" fill="url(#av-rim)"/>
        <ellipse cx="160" cy="260" rx="52" ry="42" fill="url(#av-rim2)"/>
        <ellipse cx="160" cy="265" rx="52" ry="42" fill="none" stroke="#a78bfa" stroke-width="0.4" opacity="0.12"/>

        <!-- Chest grill lines -->
        <line x1="148" y1="258" x2="172" y2="258" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>
        <line x1="145" y1="265" x2="175" y2="265" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>
        <line x1="148" y1="272" x2="172" y2="272" stroke="#a78bfa" stroke-width="1.2" opacity="0.30" stroke-linecap="round"/>

        <!-- Core glow -->
        <circle cx="160" cy="248" r="7" fill="url(#av-core)" opacity="0.9">
          <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="160" cy="248" r="3.5" fill="#c4b5fd">
          <animate attributeName="r" values="3;4;3" dur="2.4s" repeatCount="indefinite"/>
        </circle>

        <!-- Head -->
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-body)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-rim)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="url(#av-rim2)"/>
        <ellipse cx="160" cy="162" rx="68" ry="72" fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="4 6" opacity="0.10"/>

        <!-- Eye left -->
        <circle cx="136" cy="155" r="13" fill="#1a0e2e"/>
        <circle cx="136" cy="155" r="10" fill="url(#av-eye)">
          <animate attributeName="r" values="9;11;9" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="136" cy="155" r="4"  fill="#e9d5ff">
          <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="136" cy="155" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
        </circle>

        <!-- Eye right -->
        <circle cx="184" cy="155" r="13" fill="#1a0e2e"/>
        <circle cx="184" cy="155" r="10" fill="url(#av-eye)">
          <animate attributeName="r" values="9;11;9" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="184" cy="155" r="4"  fill="#e9d5ff">
          <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="184" cy="155" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="0.1s" repeatCount="indefinite"/>
        </circle>

        <!-- Mouth grill -->
        <g id="av-mouth">
          <line x1="144" y1="183" x2="176" y2="183" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="147" y1="188" x2="173" y2="188" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
          <line x1="144" y1="193" x2="176" y2="193" stroke="#a78bfa" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
        </g>

        <!-- Idle float -->
        <animateTransform
          attributeName="transform"
          type="translate"
          values="0,0; 0,-5; 0,0"
          dur="4s"
          repeatCount="indefinite"
          additive="sum"/>
      </svg>

      <!-- SVG halo ring -->
      <svg id="avatar-halo" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="halo-glow" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.18"/>
          </radialGradient>
          <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.9"/>
            <stop offset="40%"  stop-color="#38bdf8" stop-opacity="0.7"/>
            <stop offset="75%"  stop-color="#f472b6" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
          </linearGradient>
          <linearGradient id="ring-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.4"/>
            <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#f472b6" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <circle cx="160" cy="160" r="145" fill="url(#halo-glow)"/>
        <circle cx="160" cy="160" r="142" fill="none" stroke="url(#ring-grad)" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
        <circle cx="160" cy="160" r="130" fill="none" stroke="url(#ring-grad2)" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="115" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.3"/>
        <circle cx="160" cy="18"  r="3" fill="#a78bfa" opacity="0.8"/>
        <circle cx="302" cy="160" r="3" fill="#38bdf8" opacity="0.8"/>
        <circle cx="160" cy="302" r="3" fill="#f472b6" opacity="0.8"/>
        <circle cx="18"  cy="160" r="3" fill="#a78bfa" opacity="0.8"/>
        <g stroke="#a78bfa" stroke-width="1" opacity="0.4">
          <line x1="160" y1="18"  x2="160" y2="28"/>
          <line x1="302" y1="160" x2="292" y2="160"/>
          <line x1="160" y1="302" x2="160" y2="292"/>
          <line x1="18"  y1="160" x2="28"  y2="160"/>
        </g>
      </svg>

      <!-- Name + status -->
      <div id="avatar-info">
        <span id="avatar-name">Eduardo.AI</span>
        <div id="status-row">
          <svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true">
            <circle cx="4" cy="4" r="4" fill="#34d399" id="status-dot-shape"/>
          </svg>
          <span id="status-text">Inicializando…</span>
        </div>
      </div>
    </div>

    <!-- ══ Chat area ══ -->
    <div id="chat-area">

      <div id="lang-bar">
        <button class="lang-pill active" data-lang="pt">PT</button>
        <button class="lang-pill" data-lang="en">EN</button>
        <button class="lang-pill" data-lang="es">ES</button>
      </div>

      <div id="messages-wrap">
        <div id="messages"></div>
      </div>

      <div id="suggestions"></div>

      <div id="llm-loader">
        <div id="llm-loader-track">
          <div id="llm-loader-fill"></div>
        </div>
        <span id="llm-loader-label">Carregando IA local…</span>
      </div>

      <div id="input-row">

        <!-- Mic / voice button -->
        <button id="mic-btn" aria-label="Gravar voz" title="">
          <!-- State: idle / ready -->
          <svg id="mic-icon-idle" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- State: listening -->
          <svg id="mic-icon-active" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- State: locked (mic + padlock overlay) -->
          <svg id="mic-icon-locked" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
            <rect x="9" y="2" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <rect x="13" y="14" width="8" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M14.5 14v-1.5a1.5 1.5 0 0 1 3 0V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="17" cy="17" r="0.8" fill="currentColor"/>
          </svg>
          <!-- Tooltip for locked/error state -->
          <span id="mic-tooltip" role="tooltip"></span>
        </button>

        <!-- Input wrapper: positions ghost text behind real input -->
        <div id="input-wrap">
          <input
            id="chat-input"
            type="text"
            placeholder="Enviar mensagem…"
            maxlength="300"
            autocomplete="off"
            aria-label="Mensagem"
            disabled
          />
          <!-- Ghost prediction text — appears after cursor, styled to match input -->
          <span id="input-ghost" aria-hidden="true"></span>
        </div>

        <!-- Send / Stop button — icon swaps while thinking -->
        <button id="send-btn" aria-label="Enviar" disabled>
          <!-- Send icon (default) -->
          <svg id="send-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <!-- Stop icon (shown while thinking) -->
          <svg id="stop-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Disclaimer — always visible, translated by chat.js on boot + lang switch -->
  <p id="disclaimer">Eduardo.AI pode cometer erros. Verifique as respostas.</p>

  <!-- WebLLM loader — native ES module, runs in Chrome/Edge/Firefox/Safari -->
  <!-- Loads the model and sets window.__webllmReady when done           -->
  <!-- Browsers that don't support <script type="module"> ignore this    -->
  <script type="module" src="js/webllm-loader.js"></script>

  <!-- Scripts in dependency order (ES5, work in all browsers) -->
  <script src="js/knowledge.js"></script>
  <script src="js/db.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/chat.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            if (window.console) window.console.info('[SW] Registered, scope:', reg.scope);
          })
          .catch(function (err) {
            if (window.console) window.console.warn('[SW] Registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
