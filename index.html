<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eduardo.AI</title>

  <!-- ── PWA / Favicon ── -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Eduardo.AI"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png"/>
  <link rel="shortcut icon" href="favicon.ico"/>

  <!-- ── SEO / Social ── -->
  <meta name="description" content="Eduardo Souza Rodrigues — Desenvolvedor Junior. Portfólio interativo com IA local."/>
  <meta name="author" content="Eduardo Souza Rodrigues"/>

  <!--
    ── Fonts ──
    DM Sans + DM Serif Display loaded from Google Fonts with a local fallback
    chain so the UI works in LibreWolf / strict-privacy browsers even when
    the external request is blocked.
    The @font-face blocks below embed nothing — they just tell the browser
    to try the Google URL first and fall through to system fonts if blocked.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/style.css"/>

  <!-- compat.js MUST be first — patches DOM before anything else runs -->
  <script src="js/compat.js"></script>
</head>
<body>

  <!-- Ambient background SVG -->
  <svg id="bg-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <radialGradient id="bg-glow1" cx="35%" cy="30%" r="55%">
        <stop offset="0%"   stop-color="#6B4FA0" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bg-glow2" cx="70%" cy="65%" r="50%">
        <stop offset="0%"   stop-color="#1a6b7a" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="bg-glow3" cx="55%" cy="85%" r="40%">
        <stop offset="0%"   stop-color="#7a2060" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="100%" height="100%" fill="#0d0d1a"/>
    <rect width="100%" height="100%" fill="url(#bg-glow1)"/>
    <rect width="100%" height="100%" fill="url(#bg-glow2)"/>
    <rect width="100%" height="100%" fill="url(#bg-glow3)"/>
  </svg>

  <!-- Floating ambient orbs -->
  <div class="orbs" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div id="app">

    <!-- ══ Avatar area ══ -->
    <div id="avatar-area">

      <!-- Avatar image with circular frame -->
      <div id="avatar-canvas" class="avatar-image-container">
        <img
          src="avatar.png"
          alt="Avatar Eduardo.AI"
          class="avatar-img"
        />
      </div>

      <!-- SVG halo ring — ONE instance only -->
      <svg id="avatar-halo" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="halo-glow" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stop-color="#a78bfa" stop-opacity="0"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.18"/>
          </radialGradient>
          <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.9"/>
            <stop offset="40%"  stop-color="#38bdf8" stop-opacity="0.7"/>
            <stop offset="75%"  stop-color="#f472b6" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.9"/>
          </linearGradient>
          <linearGradient id="ring-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0.4"/>
            <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#f472b6" stop-opacity="0.3"/>
          </linearGradient>
        </defs>
        <circle cx="160" cy="160" r="145" fill="url(#halo-glow)"/>
        <circle cx="160" cy="160" r="142" fill="none" stroke="url(#ring-grad)"  stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
        <circle cx="160" cy="160" r="130" fill="none" stroke="url(#ring-grad2)" stroke-width="0.8"/>
        <circle cx="160" cy="160" r="115" fill="none" stroke="#a78bfa"          stroke-width="0.5" opacity="0.3"/>
        <circle cx="160" cy="18"  r="3" fill="#a78bfa" opacity="0.8"/>
        <circle cx="302" cy="160" r="3" fill="#38bdf8" opacity="0.8"/>
        <circle cx="160" cy="302" r="3" fill="#f472b6" opacity="0.8"/>
        <circle cx="18"  cy="160" r="3" fill="#a78bfa" opacity="0.8"/>
        <g stroke="#a78bfa" stroke-width="1" opacity="0.4">
          <line x1="160" y1="18"  x2="160" y2="28"/>
          <line x1="302" y1="160" x2="292" y2="160"/>
          <line x1="160" y1="302" x2="160" y2="292"/>
          <line x1="18"  y1="160" x2="28"  y2="160"/>
        </g>
      </svg>

      <!-- Name + status — ONE instance only -->
      <div id="avatar-info">
        <span id="avatar-name">Eduardo.AI</span>
        <div id="status-row">
          <svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true">
            <circle cx="4" cy="4" r="4" fill="#34d399" id="status-dot-shape"/>
          </svg>
          <span id="status-text">Inicializando…</span>
        </div>
      </div>

    </div><!-- /#avatar-area -->

    <!-- ══ Chat area ══ -->
    <div id="chat-area">

      <div id="lang-bar">
        <button class="lang-pill active" data-lang="pt">PT</button>
        <button class="lang-pill" data-lang="en">EN</button>
        <button class="lang-pill" data-lang="es">ES</button>
      </div>

      <div id="messages-wrap">
        <div id="messages"></div>
      </div>

      <div id="suggestions"></div>

      <div id="llm-loader">
        <div id="llm-loader-track">
          <div id="llm-loader-fill"></div>
        </div>
        <span id="llm-loader-label">Carregando IA local…</span>
      </div>

      <div id="input-row">

        <!-- Mic / voice button -->
        <button id="mic-btn" aria-label="Gravar voz" title="">
          <!-- State: idle / ready -->
          <svg id="mic-icon-idle" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="9" y="2" width="6" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- State: listening -->
          <svg id="mic-icon-active" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- State: locked -->
          <svg id="mic-icon-locked" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
            <rect x="9" y="2" width="6" height="10" rx="3" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
            <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <rect x="13" y="14" width="8" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M14.5 14v-1.5a1.5 1.5 0 0 1 3 0V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <circle cx="17" cy="17" r="0.8" fill="currentColor"/>
          </svg>
          <span id="mic-tooltip" role="tooltip"></span>
        </button>

        <!-- Input wrapper -->
        <div id="input-wrap">
          <input
            id="chat-input"
            type="text"
            placeholder="Enviar mensagem…"
            maxlength="300"
            autocomplete="off"
            aria-label="Mensagem"
            disabled
          />
          <span id="input-ghost" aria-hidden="true"></span>
        </div>

        <!-- Send / Stop button -->
        <button id="send-btn" aria-label="Enviar" disabled>
          <svg id="send-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg id="stop-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
            <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
          </svg>
        </button>

      </div><!-- /#input-row -->

    </div><!-- /#chat-area -->

  </div><!-- /#app -->

  <!-- Disclaimer -->
  <p id="disclaimer">Eduardo.AI pode cometer erros. Verifique as respostas.</p>

  <!-- WebLLM — ES module, ignored by browsers without module support -->
  <script type="module" src="js/webllm-loader.js"></script>

  <!-- ES5 scripts in dependency order -->
  <script src="js/knowledge.js"></script>
  <script src="js/db.js"></script>
  <script src="js/avatar.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/chat.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            if (window.console) window.console.info('[SW] Registered, scope:', reg.scope);
          })
          .catch(function (err) {
            if (window.console) window.console.warn('[SW] Registration failed:', err);
          });
      });
    }
  </script>

</body>
</html>
